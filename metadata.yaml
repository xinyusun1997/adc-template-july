apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: template
spec:
  info:
    title: adc-template-july
    source:
      repo: https://github.com/lkysow/adc-template-july.git
      sourceType: git
    version: 0.2.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
  content: {}
  interfaces:
    variables:
      - name: project_number
        description: Tenant project number for cloud resources.
        varType: string
        required: true
      - name: project_id
        varType: string
        required: true
      - name: bsa_email
        description: Borg Service account email to grant project IAM role.
        varType: string
        required: true
      - name: bucket_location
        description: The location of the storage bucket.
        varType: string
        required: true
      - name: bucket_storage_class
        description: The Storage Class of the new bucket.
        varType: string
        required: true
      - name: reasoning_engine_region
        description: The region for the Vertex AI Agent Engine.
        varType: string
        required: true
    outputs:
      - name: agent_engine_id
        description: The ID of the Agent Engine.
      - name: agent_engine_name
        description: The resource name of the Agent Engine.
      - name: bucket_name
        description: The name of the created GCS bucket.
      - name: bucket_url
        description: The URI of the created GCS bucket.
